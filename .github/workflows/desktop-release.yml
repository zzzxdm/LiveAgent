name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.0
        required: true

permissions:
  contents: write

env:
  NODE_VERSION: 22.17.1

jobs:
  release-metadata:
    name: Release Metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve release version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: node scripts/release/prepare-app-version-from-tag.mjs "$RELEASE_TAG" --github-output "$GITHUB_OUTPUT" --json

  macos:
    name: macOS ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: release-metadata
    env:
      LIVEAGENT_APP_VERSION: ${{ needs.release-metadata.outputs.app_version }}
      LIVEAGENT_IS_PRERELEASE: ${{ needs.release-metadata.outputs.is_prerelease }}
      LIVEAGENT_RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            suffix: x64
          - name: Apple Silicon
            runner: macos-14
            target: aarch64-apple-darwin
            suffix: aarch64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-metadata.outputs.release_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare release version config
        working-directory: crates/agent-gui
        run: node ../../scripts/release/prepare-app-version-from-tag.mjs "$LIVEAGENT_RELEASE_TAG" --github-env "$GITHUB_ENV" --tauri-config src-tauri/tauri.version.generated.conf.json

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protobuf compiler
        run: brew install protobuf

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/agent-gui/src-tauri

      - name: Install frontend dependencies
        working-directory: crates/agent-gui
        run: pnpm install --frozen-lockfile

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$APPLE_CERTIFICATE_P12_BASE64"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          KEYCHAIN_PATH="$RUNNER_TEMP/liveagent-release.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Store notarization profile
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$APPLE_ID"
          test -n "$APPLE_TEAM_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          xcrun notarytool store-credentials liveagent-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --validate

      - name: Build signed and notarized DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          DESKTOP_MACOS_TARGET: ${{ matrix.target }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LIVEAGENT_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          LIVEAGENT_UPDATE_REPOSITORY: ${{ github.repository }}
        run: make desktop-build-macos-release

      - name: Stage macOS artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          dmg_path="$(find "target/${{ matrix.target }}/release/bundle/dmg" -maxdepth 1 -name 'LiveAgent_*.dmg' -print -quit)"
          updater_path="$(find "target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name '*.app.tar.gz' -print -quit)"
          test -n "$dmg_path"
          test -n "$updater_path"
          test -f "$updater_path.sig"
          cp "$dmg_path" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-macOS-${{ matrix.suffix }}.dmg"
          cp "$updater_path" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-macOS-${{ matrix.suffix }}.app.tar.gz"
          cp "$updater_path.sig" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-macOS-${{ matrix.suffix }}.app.tar.gz.sig"

      - uses: actions/upload-artifact@v7
        with:
          name: liveagent-macos-${{ matrix.suffix }}
          path: dist/*
          if-no-files-found: error

  windows:
    name: Windows x64
    runs-on: windows-latest
    needs: release-metadata
    env:
      LIVEAGENT_APP_VERSION: ${{ needs.release-metadata.outputs.app_version }}
      LIVEAGENT_IS_PRERELEASE: ${{ needs.release-metadata.outputs.is_prerelease }}
      LIVEAGENT_RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-metadata.outputs.release_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare release version config
        shell: bash
        working-directory: crates/agent-gui
        run: node ../../scripts/release/prepare-app-version-from-tag.mjs "$LIVEAGENT_RELEASE_TAG" --github-env "$GITHUB_ENV" --tauri-config src-tauri/tauri.version.generated.conf.json

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: |
          choco install protoc -y --no-progress
          "$env:ChocolateyInstall\lib\protoc\tools\bin" | Out-File -Append $env:GITHUB_PATH

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/agent-gui/src-tauri

      - name: Install frontend dependencies
        working-directory: crates/agent-gui
        run: pnpm install --frozen-lockfile

      - name: Build Windows bundles
        working-directory: crates/agent-gui
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LIVEAGENT_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          LIVEAGENT_UPDATE_REPOSITORY: ${{ github.repository }}
        run: pnpm tauri build --config src-tauri/tauri.windows.release.conf.json --config "$LIVEAGENT_TAURI_VERSION_CONFIG" --target x86_64-pc-windows-msvc

      - name: Stage Windows artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          msi_path="$(find target crates/agent-gui/src-tauri/target -type f -name '*.msi' -path '*bundle*' -print -quit 2>/dev/null || true)"
          exe_path="$(find target crates/agent-gui/src-tauri/target -type f -name '*.exe' -path '*bundle*' -print -quit 2>/dev/null || true)"
          portable_exe_path="$(find target crates/agent-gui/src-tauri/target -type f -name 'liveagent.exe' -path '*/release/*' ! -path '*bundle*' -print -quit 2>/dev/null || true)"
          test -n "$msi_path"
          test -n "$exe_path"
          test -n "$portable_exe_path"
          test -f "$msi_path.sig"
          test -f "$exe_path.sig"
          cp "$msi_path" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Windows-x64.msi"
          cp "$msi_path.sig" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Windows-x64.msi.sig"
          cp "$exe_path" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Windows-x64-Setup.exe"
          cp "$exe_path.sig" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Windows-x64-Setup.exe.sig"
          mkdir -p dist/portable/LiveAgent
          cp "$portable_exe_path" dist/portable/LiveAgent/LiveAgent.exe
          portable_zip="dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Windows-x64-portable.zip"
          powershell -NoProfile -Command "Compress-Archive -Path 'dist/portable/LiveAgent/*' -DestinationPath '$portable_zip' -Force"
          rm -rf dist/portable
          test "$(find dist -type f | wc -l)" -gt 0

      - uses: actions/upload-artifact@v7
        with:
          name: liveagent-windows-x64
          path: dist/*
          if-no-files-found: error

  linux:
    name: Linux x64
    runs-on: ubuntu-latest
    needs: release-metadata
    env:
      LIVEAGENT_APP_VERSION: ${{ needs.release-metadata.outputs.app_version }}
      LIVEAGENT_IS_PRERELEASE: ${{ needs.release-metadata.outputs.is_prerelease }}
      LIVEAGENT_RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-metadata.outputs.release_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare release version config
        working-directory: crates/agent-gui
        run: node ../../scripts/release/prepare-app-version-from-tag.mjs "$LIVEAGENT_RELEASE_TAG" --github-env "$GITHUB_ENV" --tauri-config src-tauri/tauri.version.generated.conf.json

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            protobuf-compiler \
            rpm \
            wget

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/agent-gui/src-tauri

      - name: Install frontend dependencies
        working-directory: crates/agent-gui
        run: pnpm install --frozen-lockfile

      - name: Build Linux bundles
        working-directory: crates/agent-gui
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LIVEAGENT_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          LIVEAGENT_UPDATE_REPOSITORY: ${{ github.repository }}
        run: pnpm tauri build --config src-tauri/tauri.linux.release.conf.json --config "$LIVEAGENT_TAURI_VERSION_CONFIG" --target x86_64-unknown-linux-gnu --bundles appimage deb rpm

      - name: Stage Linux artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          appimage_path="$(find crates/agent-gui/src-tauri/target target -type f -name '*.AppImage' -path '*bundle*' -print -quit 2>/dev/null || true)"
          deb_path="$(find crates/agent-gui/src-tauri/target target -type f -name '*.deb' -path '*bundle*' -print -quit 2>/dev/null || true)"
          rpm_path="$(find crates/agent-gui/src-tauri/target target -type f -name '*.rpm' -path '*bundle*' -print -quit 2>/dev/null || true)"
          test -n "$appimage_path"
          test -n "$deb_path"
          test -n "$rpm_path"
          test -f "$appimage_path.sig"
          test -f "$deb_path.sig"
          test -f "$rpm_path.sig"
          cp "$appimage_path" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Linux-x86_64.AppImage"
          cp "$appimage_path.sig" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Linux-x86_64.AppImage.sig"
          cp "$deb_path" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Linux-x86_64.deb"
          cp "$deb_path.sig" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Linux-x86_64.deb.sig"
          cp "$rpm_path" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Linux-x86_64.rpm"
          cp "$rpm_path.sig" "dist/LiveAgent-${LIVEAGENT_RELEASE_TAG}-Linux-x86_64.rpm.sig"

      - uses: actions/upload-artifact@v7
        with:
          name: liveagent-linux-x64
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release-metadata
      - macos
      - windows
      - linux
    env:
      LIVEAGENT_APP_VERSION: ${{ needs.release-metadata.outputs.app_version }}
      LIVEAGENT_IS_PRERELEASE: ${{ needs.release-metadata.outputs.is_prerelease }}
      LIVEAGENT_RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
          PACKYCODE_API_KEY: ${{ secrets.PACKYCODE_API_KEY }}
          AI_RELEASE_NOTES_API_KEY: ${{ secrets.AI_RELEASE_NOTES_API_KEY }}
          AI_RELEASE_NOTES_BASE_URL: ${{ vars.AI_RELEASE_NOTES_BASE_URL }}
          AI_RELEASE_NOTES_MODEL: ${{ vars.AI_RELEASE_NOTES_MODEL }}
        run: |
          set -euo pipefail
          is_prerelease="$LIVEAGENT_IS_PRERELEASE"

          github_notes_path="$RUNNER_TEMP/liveagent-github-release-notes.md"
          notes_path="$RUNNER_TEMP/liveagent-release-notes.md"
          if ! gh api "repos/$GH_REPO/releases/generate-notes" \
            -f tag_name="$RELEASE_TAG" \
            --jq ".body" > "$github_notes_path"; then
            printf 'LiveAgent %s\n' "$RELEASE_TAG" > "$github_notes_path"
          fi
          if [ ! -s "$github_notes_path" ]; then
            printf 'LiveAgent %s\n' "$RELEASE_TAG" > "$github_notes_path"
          fi

          node scripts/release/create-ai-release-notes.mjs "$RELEASE_TAG" "$notes_path" "$github_notes_path"
          if [ ! -s "$notes_path" ]; then
            printf 'LiveAgent %s\n' "$RELEASE_TAG" > "$notes_path"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            edit_args=(--title "LiveAgent $RELEASE_TAG" --notes-file "$notes_path")
            if [ "$is_prerelease" = true ]; then
              edit_args+=(--prerelease)
            else
              edit_args+=(--prerelease=false --latest)
            fi
            gh release edit "$RELEASE_TAG" "${edit_args[@]}"
          else
            create_args=(--verify-tag --title "LiveAgent $RELEASE_TAG" --notes-file "$notes_path")
            if [ "$is_prerelease" = true ]; then
              create_args+=(--prerelease)
            fi
            gh release create "$RELEASE_TAG" "${create_args[@]}"
          fi

          mapfile -t signature_assets < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name | select(endswith(".sig"))')
          for asset in "${signature_assets[@]}"; do
            gh release delete-asset "$RELEASE_TAG" "$asset" --yes
          done

          rm -rf public-release-assets
          mkdir -p public-release-assets
          find release-artifacts -maxdepth 1 -type f ! -name '*.sig' ! -name latest.json -exec cp {} public-release-assets/ \;

          shopt -s nullglob
          public_assets=(public-release-assets/*)
          if [ "${#public_assets[@]}" -eq 0 ]; then
            echo "No public release assets were found."
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${public_assets[@]}" --clobber

          node scripts/release/create-tauri-updater-manifest.mjs release-artifacts release-artifacts/latest.json "$notes_path"
          gh release upload "$RELEASE_TAG" release-artifacts/latest.json --clobber
