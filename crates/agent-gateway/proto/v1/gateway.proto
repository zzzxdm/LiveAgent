syntax = "proto3";

package liveagent.gateway.v1;

option go_package = "github.com/liveagent/agent-gateway/internal/proto/v1;gatewayv1";

service AgentGateway {
  rpc AgentConnect(stream AgentEnvelope) returns (stream GatewayEnvelope);
  rpc AgentTerminalConnect(stream TerminalStreamFrame) returns (stream TerminalStreamFrame);
  rpc Authenticate(AuthRequest) returns (AuthResponse);
}

message AuthRequest {
  string token = 1;
  string agent_id = 2;
  string agent_version = 3;
}

message AuthResponse {
  bool success = 1;
  string message = 2;
  string session_id = 3;
}

message GatewayEnvelope {
  string request_id = 1;
  int64 timestamp = 2;

  oneof payload {
    ChatCommandRequest chat_command = 10;
    CronManageRequest cron_manage = 20;
    HistoryListRequest history_list = 30;
    HistoryGetRequest history_get = 31;
    HistoryRenameRequest history_rename = 32;
    HistoryDeleteRequest history_delete = 33;
    HistoryPrefixRequest history_prefix = 34;
    HistoryPinRequest history_pin = 35;
    HistoryShareGetRequest history_share_get = 36;
    HistoryShareSetRequest history_share_set = 37;
    HistoryShareResolveRequest history_share_resolve = 38;
    HistoryWorkdirsRequest history_workdirs = 39;
    ProviderListRequest provider_list = 40;
    SettingsGetRequest settings_get = 41;
    SettingsUpdateRequest settings_update = 42;
    SkillFilesListRequest skill_files_list = 43;
    SkillMetadataReadRequest skill_metadata_read = 44;
    SkillTextReadRequest skill_text_read = 45;
    FileMentionListRequest file_mention_list = 46;
    UploadReadableFilesRequest upload_readable_files = 47;
    FsRootsRequest fs_roots = 48;
    FsListDirsRequest fs_list_dirs = 49;
    PingRequest ping = 50;
    UploadedImagePreviewRequest uploaded_image_preview = 51;
    MemoryManageRequest memory_manage = 52;
    SkillManageRequest skill_manage = 53;
    FsCreateProjectFolderRequest fs_create_project_folder = 54;
    TerminalRequest terminal_request = 55;
    FsListRequest fs_list = 56;
    FsWriteTextRequest fs_write_text = 57;
    FsCreateDirRequest fs_create_dir = 58;
    FsRenameRequest fs_rename = 59;
    FsDeleteRequest fs_delete = 60;
    GitRequest git_request = 61;
    FsReadEditableTextRequest fs_read_editable_text = 62;
    FsReadWorkspaceImageRequest fs_read_workspace_image = 63;
    SftpRequest sftp_request = 64;
    ProviderModelsRequest provider_models = 65;
    SettingsResetSshKnownHostRequest settings_reset_ssh_known_host = 72;
    ChatQueueRequest chat_queue = 73;
    TunnelStateSnapshot tunnel_state = 80;
    TunnelMutation tunnel_mutation = 81;
    TunnelFrame tunnel_frame = 82;
    WorkspaceWatchRequest workspace_watch = 90;
    ManagedProcessRequest managed_process_request = 91;
    HistoryBranchRequest history_branch = 92;
  }

  // Legacy tunnel control/frame payloads (pre-rewrite protocol) and the
  // never-wired chat event replay request.
  reserved 67, 68, 69, 74;
}

message AgentEnvelope {
  string request_id = 1;
  int64 timestamp = 2;

  oneof payload {
    ChatEvent chat_event = 10;
    CronManageResponse cron_manage_resp = 20;
    HistoryListResponse history_list_resp = 30;
    HistoryGetResponse history_get_resp = 31;
    HistoryRenameResponse history_rename_resp = 32;
    HistoryDeleteResponse history_delete_resp = 33;
    HistorySyncEvent history_sync = 34;
    HistoryPrefixResponse history_prefix_resp = 35;
    HistoryPinResponse history_pin_resp = 36;
    HistoryShareGetResponse history_share_get_resp = 37;
    HistoryShareSetResponse history_share_set_resp = 38;
    HistoryShareResolveResponse history_share_resolve_resp = 39;
    HistoryWorkdirsResponse history_workdirs_resp = 56;
    ProviderListResponse provider_list_resp = 40;
    SettingsGetResponse settings_get_resp = 41;
    SettingsUpdateResponse settings_update_resp = 42;
    SettingsSyncEvent settings_sync = 43;
    SkillFilesListResponse skill_files_list_resp = 44;
    SkillMetadataReadResponse skill_metadata_read_resp = 45;
    SkillTextReadResponse skill_text_read_resp = 46;
    FileMentionListResponse file_mention_list_resp = 47;
    UploadReadableFilesResponse upload_readable_files_resp = 48;
    FsRootsResponse fs_roots_resp = 49;
    PongResponse pong = 50;
    FsListDirsResponse fs_list_dirs_resp = 51;
    UploadedImagePreviewResponse uploaded_image_preview_resp = 52;
    MemoryManageResponse memory_manage_resp = 53;
    SkillManageResponse skill_manage_resp = 54;
    FsCreateProjectFolderResponse fs_create_project_folder_resp = 55;
    TerminalResponse terminal_response = 57;
    TerminalEvent terminal_event = 58;
    FsListResponse fs_list_resp = 59;
    FsWriteTextResponse fs_write_text_resp = 60;
    FsCreateDirResponse fs_create_dir_resp = 61;
    FsRenameResponse fs_rename_resp = 62;
    FsDeleteResponse fs_delete_resp = 63;
    GitResponse git_response = 64;
    FsReadEditableTextResponse fs_read_editable_text_resp = 65;
    FsReadWorkspaceImageResponse fs_read_workspace_image_resp = 66;
    SftpResponse sftp_response = 73;
    SftpEvent sftp_event = 74;
    ChatQueueResponse chat_queue_resp = 75;
    ChatQueueEvent chat_queue_event = 76;
    ChatControlEvent chat_control = 70;
    RuntimeStatusEvent runtime_status = 71;
    SettingsResetSshKnownHostResponse settings_reset_ssh_known_host_resp = 72;
    ChatRuntimeSnapshot chat_runtime_snapshot = 77;
    ProviderModelsResponse provider_models_resp = 79;
    TunnelDesiredState tunnel_desired = 80;
    TunnelMutationResult tunnel_mutation_result = 81;
    TunnelFrame tunnel_frame = 82;
    TunnelProbeReport tunnel_probe_report = 83;
    WorkspaceActivityEvent workspace_activity = 90;
    ManagedProcessResponse managed_process_response = 91;
    ManagedProcessSnapshot managed_process_snapshot = 92;
    HistoryBranchResponse history_branch_resp = 93;
    ErrorResponse error = 99;
  }

  // Legacy tunnel control/frame payloads (pre-rewrite protocol) and the
  // never-wired chat event replay response.
  reserved 67, 68, 69, 78;
}

message ChatSelectedModel {
  string custom_provider_id = 1;
  string model = 2;
  string provider_type = 3;
}

message ChatRuntimeControls {
  bool thinking_enabled = 1;
  bool native_web_search_enabled = 2;
  string reasoning = 3;
}

message ChatUploadedFile {
  string relative_path = 1;
  string absolute_path = 2;
  string file_name = 3;
  string kind = 4;
  int64 size_bytes = 5;
}

message UploadReadableFile {
  string file_name = 1;
  string mime_type = 2;
  bytes content = 3;
}

message UploadReadableFilesRequest {
  string workdir = 1;
  repeated UploadReadableFile files = 2;
}

message UploadReadableFilesResponse {
  repeated ChatUploadedFile files = 1;
  repeated string skipped = 2;
}

message UploadedImagePreviewRequest {
  string workdir = 1;
  string absolute_path = 2;
}

message UploadedImagePreviewResponse {
  string mime_type = 1;
  string data = 2;
}

// ---- Tunnel desired state (agent -> gateway) ----

message TunnelSpec {
  string id = 1;               // agent-generated, stable across restarts
  string slug_hint = 2;        // last allocated slug; gateway honors when valid and unused
  string name = 3;
  string target_url = 4;       // http://localhost:PORT[/base]
  int64 expires_at = 5;        // unix seconds, 0 = never
  string project_path_key = 6;
}

message TunnelDesiredState {
  repeated TunnelSpec tunnels = 1;
  uint64 revision = 2;         // agent-side monotonic
}

// ---- Tunnel runtime snapshot (gateway -> agent, mirrored to /ws JSON) ----

message TunnelHealth {
  string status = 1;           // "ok" | "failed" | "unknown"
  uint32 http_status = 2;      // local layer only
  string error = 3;
  int64 checked_at = 4;
  uint32 rtt_ms = 5;           // relay layer only
}

message TunnelStatus {
  string id = 1;
  string slug = 2;
  string name = 3;
  string target_url = 4;
  string public_path = 5;      // "/t/{slug}/"; clients compose the full URL
  int64 created_at = 6;
  int64 expires_at = 7;
  uint32 active_connections = 8;
  string project_path_key = 9;
  TunnelHealth local = 10;     // agent -> local service reachability
}

message TunnelStateSnapshot {
  repeated TunnelStatus tunnels = 1;
  uint64 revision = 2;         // gateway-side monotonic
  bool agent_online = 3;
  TunnelHealth relay = 4;      // gateway <-> agent frame path
}

// ---- Tunnel mutations forwarded gateway -> agent (webui-originated) ----

message TunnelMutation {
  string action = 1;           // "create" | "update" | "close" | "check"
  string tunnel_id = 2;        // update/close/check
  string target_url = 3;
  string name = 4;
  optional uint32 ttl_seconds = 5; // absent on update = keep current expiry
  string project_path_key = 6;
}

message TunnelMutationResult {
  string tunnel_id = 1;
  string error_code = 2;       // "" = ok; invalid_target|limit_exceeded|not_found|invalid_ttl
  string error_message = 3;
}

// ---- Tunnel local-service probe results (agent -> gateway) ----

message TunnelProbeResult {
  string tunnel_id = 1;
  TunnelHealth local = 2;
}

message TunnelProbeReport {
  repeated TunnelProbeResult results = 1;
}

// ---- Tunnel data plane ----

message TunnelHeader {
  string name = 1;
  string value = 2;
}

enum TunnelFrameKind {
  TUNNEL_FRAME_KIND_UNSPECIFIED = 0;
  TUNNEL_FRAME_KIND_HTTP_REQUEST_START = 1;
  TUNNEL_FRAME_KIND_HTTP_REQUEST_BODY = 2;
  TUNNEL_FRAME_KIND_HTTP_REQUEST_END = 3;
  TUNNEL_FRAME_KIND_HTTP_RESPONSE_START = 4;
  TUNNEL_FRAME_KIND_HTTP_RESPONSE_BODY = 5;
  TUNNEL_FRAME_KIND_HTTP_RESPONSE_END = 6;
  TUNNEL_FRAME_KIND_WS_DIAL = 7;
  TUNNEL_FRAME_KIND_WS_DIAL_OK = 8;
  TUNNEL_FRAME_KIND_WS_DIAL_ERROR = 9;
  TUNNEL_FRAME_KIND_WS_FRAME = 10;
  TUNNEL_FRAME_KIND_WS_CLOSE = 11;
  TUNNEL_FRAME_KIND_ERROR = 12;
  TUNNEL_FRAME_KIND_CANCEL = 13;
  TUNNEL_FRAME_KIND_PING = 14;
  TUNNEL_FRAME_KIND_PONG = 15;
}

enum TunnelWsMessageType {
  TUNNEL_WS_MESSAGE_TYPE_UNSPECIFIED = 0;
  TUNNEL_WS_MESSAGE_TYPE_TEXT = 1;
  TUNNEL_WS_MESSAGE_TYPE_BINARY = 2;
}

message TunnelFrame {
  string stream_id = 1;
  TunnelFrameKind kind = 2;
  string target_url = 3;       // set on HTTP_REQUEST_START and WS_DIAL only
  string method = 4;
  string path = 5;             // path+query relative to the target base
  repeated TunnelHeader headers = 6;
  uint32 status = 7;
  bytes body = 8;
  string error = 9;
  TunnelWsMessageType ws_message_type = 10;
  string ws_subprotocol = 11;
  uint32 ws_close_code = 12;
  string ws_close_reason = 13;
}

// ---- Workspace activity watch (gateway -> agent declarative full set,
// ---- agent -> gateway debounced change events) ----

message WorkspaceWatchRequest {
  repeated string workdirs = 1;  // full desired set; replaces the previous one
}

message WorkspaceActivityEvent {
  string workdir = 1;
  uint64 revision = 2;           // per-workdir monotonic within one agent process
  bool fs = 3;                   // working-tree content changed
  bool git = 4;                  // git state (HEAD/refs/index/...) changed
  repeated string changed_paths = 5;  // relative to workdir, deduped, capped
  bool truncated = 6;            // changed_paths hit the cap or is unknown
}

// ---- Managed processes (ManagedProcess tool children on the agent host).
// ---- Agent broadcasts full-table snapshots; the gateway caches the latest
// ---- and fans it out to webui subscribers. Panel operations are forwarded
// ---- gateway -> agent and answered with the same request_id. ----

message ManagedProcessRecord {
  string id = 1;
  string label = 2;
  string command = 3;
  string cwd = 4;
  string shell = 5;
  uint32 pid = 6;
  string log_path = 7;
  int64 started_at = 8;             // unix ms
  optional int64 finished_at = 9;   // unix ms
  optional int32 exit_code = 10;    // absent for restored/pid-managed entries
  bool running = 11;
  bool isolated = 12;               // survives LiveAgent exit
  bool restored = 13;               // recovered after restart; managed by pid
}

message ManagedProcessSnapshot {
  repeated ManagedProcessRecord processes = 1;
  uint64 revision = 2;              // agent-side monotonic, restart-safe
}

message ManagedProcessRequest {
  string action = 1;                // "snapshot" | "stop" | "read_log" | "clear"
  string process_id = 2;            // stop/read_log; optional for clear
  uint32 max_bytes = 3;             // read_log only; 0 = default
}

message ManagedProcessResponse {
  string action = 1;
  ManagedProcessSnapshot snapshot = 2;  // set for snapshot/stop/clear
  string log_content = 3;               // read_log only
  string log_path = 4;                  // read_log only
  bool log_truncated = 5;               // read_log only
  bool stopped = 6;                     // stop only
}

message MemoryManageRequest {
  string command = 1;
  string args_json = 2;
}

message MemoryManageResponse {
  string result_json = 1;
}

message TerminalRequest {
  string action = 1;
  string session_id = 2;
  string project_path_key = 3;
  string cwd = 4;
  string shell = 5;
  string title = 6;
  string data = 7;
  uint32 cols = 8;
  uint32 rows = 9;
  uint32 max_bytes = 10;
  string ssh_host_id = 11;
  string prompt_id = 12;
  string prompt_answer = 13;
  bool trust_host_key = 14;
  bool sftp_enabled = 15;
  string tab_id = 16;
  string tab_kind = 17;
}

message TerminalSession {
  string id = 1;
  string project_path_key = 2;
  string cwd = 3;
  string shell = 4;
  string title = 5;
  uint32 pid = 6;
  uint32 cols = 7;
  uint32 rows = 8;
  uint64 created_at = 9;
  uint64 updated_at = 10;
  uint64 finished_at = 11;
  int32 exit_code = 12;
  bool running = 13;
  string kind = 14;
  TerminalSshMetadata ssh = 15;
}

message TerminalSshMetadata {
  string host_id = 1;
  string host_name = 2;
  string username = 3;
  string host = 4;
  uint32 port = 5;
  string auth_type = 6;
  string status = 7;
  uint32 reconnect_attempt = 8;
  uint32 reconnect_max_attempts = 9;
  bool sftp_enabled = 10;
}

message SftpRequest {
  string action = 1;
  string session_id = 2;
  string project_path_key = 3;
  string workdir = 4;
  string local_path = 5;
  string remote_path = 6;
  string from_path = 7;
  string to_path = 8;
  string direction = 9;
  string target_path = 10;
  bool recursive = 11;
  bool overwrite = 12;
}

message SftpEntry {
  string path = 1;
  string name = 2;
  string kind = 3;
  uint64 size_bytes = 4;
  uint64 mtime = 5;
}

message SftpTransfer {
  string id = 1;
  string session_id = 2;
  string direction = 3;
  string status = 4;
  string source_path = 5;
  string target_path = 6;
  string current_path = 7;
  uint64 bytes_done = 8;
  uint64 bytes_total = 9;
  uint32 files_done = 10;
  uint32 files_total = 11;
  string error = 12;
}

message SftpResponse {
  string action = 1;
  string path = 2;
  repeated SftpEntry entries = 3;
  SftpEntry entry = 4;
  bool exists = 5;
  SftpTransfer transfer = 6;
}

message SftpEvent {
  string kind = 1;
  SftpTransfer transfer = 2;
}

message TerminalSshPrompt {
  string id = 1;
  string kind = 2;
  string host_id = 3;
  string host_name = 4;
  string host = 5;
  uint32 port = 6;
  string message = 7;
  string fingerprint_sha256 = 8;
  string key_type = 9;
  bool answer_echo = 10;
}

message TerminalShellOption {
  string id = 1;
  string label = 2;
  string command = 3;
}

message TerminalSshTab {
  string id = 1;
  string session_id = 2;
  string project_path_key = 3;
  string kind = 4;
  uint64 created_at = 5;
  uint64 updated_at = 6;
}

message TerminalSshTabsSnapshot {
  reserved 3;
  string project_path_key = 1;
  repeated TerminalSshTab tabs = 2;
  uint64 revision = 4;
}

message TerminalResponse {
  string action = 1;
  repeated TerminalSession sessions = 2;
  TerminalSession session = 3;
  bytes output = 4;
  bool truncated = 5;
  repeated TerminalShellOption shell_options = 6;
  string default_shell = 7;
  uint64 output_start_offset = 8;
  uint64 output_end_offset = 9;
  TerminalSshPrompt ssh_prompt = 10;
  uint32 latency_ms = 11;
  TerminalSshTabsSnapshot ssh_tabs = 12;
}

message TerminalEvent {
  string kind = 1;
  string session_id = 2;
  string project_path_key = 3;
  TerminalSession session = 4;
  bytes data = 5;
  uint64 output_start_offset = 6;
  uint64 output_end_offset = 7;
  TerminalSshTabsSnapshot ssh_tabs = 8;
}

message TerminalStreamFrame {
  string kind = 1;
  string stream_id = 2;
  string session_id = 3;
  string project_path_key = 4;
  uint64 seq = 5;
  uint64 start_offset = 6;
  uint64 end_offset = 7;
  uint32 cols = 8;
  uint32 rows = 9;
  uint32 max_bytes = 10;
  bool truncated = 11;
  string error = 12;
  TerminalSession session = 13;
  bytes data = 14;
}

message GitRequest {
  string action = 1;
  string workdir = 2;
  string args_json = 3;
}

message GitResponse {
  string action = 1;
  string result_json = 2;
}

message ChatRequest {
  string conversation_id = 1;
  string message = 2;
  ChatSelectedModel selected_model = 3;
  string execution_mode = 4;
  string workdir = 5;
  repeated string selected_system_tools = 6;
  repeated ChatUploadedFile uploaded_files = 7;
  string client_request_id = 8;
  ChatRuntimeControls runtime_controls = 9;
  string queue_policy = 10;
}

message ChatMessageRef {
  int32 segment_index = 1;
  int32 message_index = 2;
  string segment_id = 3;
  string message_id = 4;
  string role = 5;
  string content_hash = 6;
}

message CancelChatRequest {
  string conversation_id = 1;
}

message ChatCommandRequest {
  string type = 1;
  ChatRequest request = 2;
  ChatMessageRef base_message_ref = 3;
  CancelChatRequest cancel = 4;
}

message ChatQueueRequest {
  string action = 1;
  string conversation_id = 2;
  string item_id = 3;
  string direction = 4;
  uint64 revision = 5;
  string draft_json = 6;
  string uploaded_files_json = 7;
  string request_json = 8;
}

message ChatQueueResponse {
  bool accepted = 1;
  string message = 2;
  string snapshot_json = 3;
  string item_json = 4;
  string error_code = 5;
  uint64 revision = 6;
}

message ChatQueueEvent {
  string conversation_id = 1;
  string snapshot_json = 2;
  uint64 revision = 3;
}

message ChatEvent {
  ChatEventType type = 1;
  string conversation_id = 2;
  string data = 3;

  enum ChatEventType {
    TOKEN = 0;
    THINKING = 1;
    TOOL_CALL = 2;
    TOOL_RESULT = 3;
    DONE = 4;
    ERROR = 5;
    TOOL_STATUS = 6;
    HOSTED_SEARCH = 7;
    USER_MESSAGE = 8;
  }
}

message ChatControlEvent {
  string request_id = 1;
  string client_request_id = 2;
  string conversation_id = 3;
  int64 run_epoch = 4;
  string type = 5;
  string state = 6;
  string error_code = 7;
  string message = 8;
  int64 seq = 9;
}

message ChatRuntimeSnapshot {
  string conversation_id = 1;
  string run_id = 2;
  string client_request_id = 3;
  string worker_id = 4;
  string state = 5;
  string cwd = 6;
  int64 updated_at = 7;
  int64 revision = 8;
  string entries_json = 9;
  string tool_status = 10;
  bool tool_status_is_compaction = 11;
}

message RuntimeStatusEvent {
  string worker_id = 1;
  string state = 2;
  bool visible = 3;
  uint32 active_run_count = 4;
  int64 timestamp = 5;
  repeated ChatRunReport active_runs = 6;
  repeated ChatRunReport finished_runs = 7;
}

message ChatRunReport {
  string run_id = 1;
  string conversation_id = 2;
  string state = 3;
  string error_code = 4;
  string message = 5;
  int64 updated_at = 6;
}

message CronManageRequest {
  string action = 1;
  string task_id = 2;
  string task_json = 3;
}

message CronManageResponse {
  string action = 1;
  string result_json = 2;
}

message HistoryListRequest {
  int32 page = 1;
  int32 page_size = 2;
  string cwd = 3;
  bool cwd_empty = 4;
}

message HistoryListResponse {
  repeated ConversationSummary conversations = 1;
  int32 total_count = 2;
}

message ConversationSummary {
  string id = 1;
  string title = 2;
  int64 created_at = 3;
  int64 updated_at = 4;
  int32 message_count = 5;
  string provider_id = 6;
  string model = 7;
  string session_id = 8;
  string cwd = 9;
  bool is_pinned = 10;
  int64 pinned_at = 11;
  bool is_shared = 12;
  string selected_model_json = 13;
}

message HistoryGetRequest {
  string conversation_id = 1;
  int32 max_messages = 2;
}

message HistoryGetResponse {
  string conversation_id = 1;
  string messages_json = 2;
  int32 total_message_count = 3;
  int32 returned_message_count = 4;
  bool has_more = 5;
  ConversationSummary conversation = 6;
}

message HistoryPrefixRequest {
  string conversation_id = 1;
  int32 max_messages = 2;
  ChatMessageRef base_message_ref = 3;
}

message HistoryPrefixResponse {
  string conversation_id = 1;
  string messages_json = 2;
  int32 total_message_count = 3;
  int32 returned_message_count = 4;
  bool has_more = 5;
  ConversationSummary conversation = 6;
}

message HistoryRenameRequest {
  string conversation_id = 1;
  string title = 2;
}

message HistoryRenameResponse {
  ConversationSummary conversation = 1;
}

// Copies the conversation prefix up to and including the assistant response
// that answers the anchored user message (base_message_ref) into a brand-new
// conversation titled "新分支".
message HistoryBranchRequest {
  string conversation_id = 1;
  ChatMessageRef base_message_ref = 2;
}

message HistoryBranchResponse {
  ConversationSummary conversation = 1;
}

message HistoryPinRequest {
  string conversation_id = 1;
  bool is_pinned = 2;
}

message HistoryPinResponse {
  ConversationSummary conversation = 1;
}

message HistoryShareStatus {
  string conversation_id = 1;
  bool enabled = 2;
  string token = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
  bool redact_tool_content = 6;
}

message HistoryShareGetRequest {
  string conversation_id = 1;
}

message HistoryShareGetResponse {
  HistoryShareStatus share = 1;
}

message HistoryShareSetRequest {
  string conversation_id = 1;
  bool enabled = 2;
  optional bool redact_tool_content = 3;
}

message HistoryShareSetResponse {
  HistoryShareStatus share = 1;
}

message HistoryShareResolveRequest {
  string token = 1;
}

message HistoryShareResolveResponse {
  string conversation_id = 1;
  string messages_json = 2;
  int32 total_message_count = 3;
  ConversationSummary conversation = 4;
  bool redact_tool_content = 5;
}

message HistoryWorkdirsRequest {}

message HistoryWorkdirSummary {
  string path = 1;
  int32 conversation_count = 2;
  int64 updated_at = 3;
}

message HistoryWorkdirsResponse {
  repeated HistoryWorkdirSummary workdirs = 1;
}

message HistoryDeleteRequest {
  string conversation_id = 1;
}

message HistoryDeleteResponse {}

message HistorySyncEvent {
  string kind = 1;
  ConversationSummary conversation = 2;
  string conversation_id = 3;
}

message ProviderListRequest {}

message ProviderListResponse {
  string providers_json = 1;
}

message SettingsGetRequest {}

message SettingsGetResponse {
  string settings_json = 1;
}

message SettingsUpdateRequest {
  string settings_json = 1;
}

message SettingsUpdateResponse {
  bool accepted = 1;
  string message = 2;
}

message SettingsResetSshKnownHostRequest {
  string host = 1;
  uint32 port = 2;
}

message SettingsResetSshKnownHostResponse {
  uint32 deleted = 1;
}

message SettingsSyncEvent {
  string settings_json = 1;
}

message SkillFilesListRequest {}

message SkillFilesListResponse {
  string root_dir = 1;
  repeated string paths = 2;
  bool truncated = 3;
}

message SkillMetadataReadRequest {
  string path = 1;
}

message SkillMetadataReadResponse {
  string name = 1;
  string description = 2;
}

message SkillTextReadRequest {
  string path = 1;
  uint32 offset = 2;
